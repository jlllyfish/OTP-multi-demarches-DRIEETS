name: Synchro Multi-Démarche DRIEETS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      demarche_numbers:
        description: 'Numéros de démarches à synchroniser (séparés par des virgules, vide = toutes)'
        required: false
        default: ''
      force_sync:
        description: 'Forcer la synchronisation même si démarche désactivée'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Mode test (ne fait que valider la configuration)'
        required: false
        default: 'false'
        type: boolean

jobs:
  validate-config:
    name: Validation de la configuration
    runs-on: ubuntu-latest
    outputs:
      config-valid: ${{ steps.validate.outputs.valid }}
      demarches-count: ${{ steps.validate.outputs.count }}

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validation de la configuration
      id: validate
      env:
        GRIST_BASE_URL: ${{ secrets.GRIST_BASE_URL }}
        GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
        GRIST_DOC_ID: ${{ secrets.GRIST_DOC_ID }}
        
        API_TOKEN_DRIEETS: ${{ secrets.API_TOKEN_DRIEETS }}
      run: |
        echo "🔍 Validation de la configuration multi-démarche..."
        python multi_demarche_manager.py --validate-only

        python -c "
        from multi_demarche_manager import MultiDemarcheManager
        import sys
        import os

        try:
            manager = MultiDemarcheManager()
            valid = manager.validate_configuration()
            enabled_count = len(manager.get_enabled_demarches())

            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write(f'valid={str(valid).lower()}\n')
                f.write(f'count={enabled_count}\n')

            if not valid:
                sys.exit(1)
        except Exception as e:
            print(f'❌ Erreur de validation: {e}')
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write('valid=false\n')
                f.write('count=0\n')
            sys.exit(1)
        "

  sync-demarches:
    name: Synchronisation des démarches
    runs-on: ubuntu-latest
    needs: validate-config
    if: needs.validate-config.outputs.config-valid == 'true'

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Création du répertoire de logs
      run: mkdir -p logs

    - name: Affichage des paramètres d'exécution
      run: |
        echo "📋 Paramètres d'exécution :"
        echo "  - Démarches configurées : ${{ needs.validate-config.outputs.demarches-count }}"
        echo "  - Démarches spécifiques : ${{ github.event.inputs.demarche_numbers || 'Toutes les démarches activées' }}"
        echo "  - Force sync : ${{ github.event.inputs.force_sync || 'false' }}"
        echo "  - Mode test : ${{ github.event.inputs.dry_run || 'false' }}"
        echo "  - Déclencheur : ${{ github.event_name }}"

    - name: Synchronisation multi-démarche
      env:
        GRIST_BASE_URL: ${{ secrets.GRIST_BASE_URL }}
        GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
        GRIST_DOC_ID: ${{ secrets.GRIST_DOC_ID }}
        
        API_TOKEN_DRIEETS: ${{ secrets.API_TOKEN_DRIEETS }}
        DEMARCHE_NUMBERS: ${{ github.event.inputs.demarche_numbers }}
        FORCE_SYNC: ${{ github.event.inputs.force_sync }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
        LOG_LEVEL: INFO
      run: |
        echo "🚀 Démarrage de la synchronisation multi-démarche"

        CMD="python multi_demarche_manager.py"

        if [ "$DRY_RUN" = "true" ]; then
          CMD="$CMD --dry-run"
          echo "🧪 Mode test activé"
        fi

        if [ -n "$DEMARCHE_NUMBERS" ]; then
          CMD="$CMD --demarches $DEMARCHE_NUMBERS"
          echo "📋 Synchronisation des démarches spécifiques : $DEMARCHE_NUMBERS"
        else
          echo "📋 Synchronisation de toutes les démarches activées"
        fi

        if [ "$FORCE_SYNC" = "true" ]; then
          CMD="$CMD --force"
          echo "⚡ Mode force activé"
        fi

        echo "Commande : $CMD"
        eval $CMD

    - name: Upload des logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sync-logs-${{ github.run_number }}
        path: logs/
        retention-days: 30
        if-no-files-found: ignore

    - name: Notification de fin
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Synchronisation multi-démarche terminée avec succès"
          echo "📊 ${{ needs.validate-config.outputs.demarches-count }} démarches configurées"
        else
          echo "❌ Synchronisation multi-démarche échouée"
          exit 1
        fi

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [validate-config, sync-demarches]
    if: always()

    steps:
    - name: Notification webhook (optionnelle)
      continue-on-error: true
      run: |
        if [ -n "${{ secrets.NOTIFICATION_WEBHOOK_URL }}" ]; then
          STATUS="${{ needs.sync-demarches.result }}"
          DEMARCHES_COUNT="${{ needs.validate-config.outputs.demarches-count }}"

          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ Synchronisation multi-démarche réussie ($DEMARCHES_COUNT démarches)"
            COLOR="good"
          else
            MESSAGE="❌ Synchronisation multi-démarche échouée"
            COLOR="danger"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$MESSAGE\",\"color\":\"$COLOR\"}" \
          ${{ secrets.NOTIFICATION_WEBHOOK_URL }}

          echo "📧 Notification webhook envoyée"
        else
          echo "📧 Aucun webhook configuré, notification ignorée"
        fi

    - name: Notification email (optionnelle)
      continue-on-error: true
      run: |
        if [ -n "${{ secrets.NOTIFICATION_EMAIL_TO }}" ] && [ -n "${{ secrets.SMTP_SERVER }}" ]; then
          echo "📧 Configuration email détectée, envoi de la notification..."
          echo "STATUS: ${{ needs.sync-demarches.result }}"
          echo "DEMARCHES: ${{ needs.validate-config.outputs.demarches-count }}"
          echo "URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "📧 Notification email préparée (implémentation à personnaliser)"
        else
          echo "📧 Aucun paramètre email configuré, notification ignorée"
        fi
